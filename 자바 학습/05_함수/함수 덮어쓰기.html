        <script>
            function addSomeNumber(num) {
                return num + 10;
            }
            function addSomeNumber(num) {   // 위에서 정의한 함수를
                return num + 30;            // 무시하고 덮어씌운다.
        }
        var result = addSomeNumber(400);
        alert(result);
