<!DOCTYPE html>
<html>
    <head>
    </head>
    <body>
        <script>
            function sayHi() { // 인자 값이 없어도 호출이 가능하다
                alert(arguments.length);
                if(arguments.length == 1) {
                    alert(arguments[0]);
                }else if(arguments.length == 2) {
                    alert(arguments[0] + ':' + arguments[1]);
                }
            }
            sayHi();
            sayHi('jihwan'); // 인자가 자동으로 추가됨
            sayHi('jihwan', 'kildong')
        </script>
    </body>
</html>
