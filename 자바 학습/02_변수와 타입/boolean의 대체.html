<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
    </head>
    <body>
        <script type="text/javascript">
            // 0은 false로 취급됨 (실행 안 됨)
            if (0) {
                alert(1);
            }
            
            // 1은 true로 취급됨 (실행됨)
            if (1) {
                alert(2);
            }
            
            // 빈 문자열('')은 false, !를 붙였으므로 true가 됨 (실행됨)
            if (!'') {
                alert('빈 문자열');
            }
            
            // undefined는 false, !를 붙였으므로 true가 됨 (실행됨)
            if (!undefined) {
                alert('undefined');
            }
            
            // null은 false, !를 붙였으므로 true가 됨 (실행됨)
            if (!null) {
                alert('null');
            }
            
            // NaN은 false, !를 붙였으므로 true가 됨 (실행됨)
            if (!NaN) {
                alert('NaN');
            }
            
            // 0/0은 NaN이 됨, !를 붙였으므로 true가 됨 (실행됨)
            if (!(0 / 0)) {
                alert('0/0');
            }
        </script>
    </body>
</html>
