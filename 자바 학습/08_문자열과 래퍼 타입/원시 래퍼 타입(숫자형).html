<!DOCTYPE html>
<html>
    <head>
    </head>
    <body>
        <script>
        // 정수
        var num = 10;

        alert(num.toString());  // "10"
        alert(num.toString(2));  // "1010"
        alert(num.toString(8));  // "12"
        alert(num.toString(10));  // "10"
        alert(num.toString(16));  // "a"

        var num2 = 10;
        alert(num2.toFixed(2));  //"10.00"
        
        var num3 = 10.005;
        alert(num3.toFixed(2));  //"10.01"
        </script>
    </body>
</html>
