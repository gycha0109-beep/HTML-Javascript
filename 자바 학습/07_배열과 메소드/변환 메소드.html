<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
</head>
<body>
<script>

var person1 = {
    toLocaleString : function() {
        return "Nikolas";
    },
    toString : function() {
        return "Nicholas";
    }
};

var person2 = {
    toLocaleString : function() {
        return "Grigorios";
    },
    toString : function() {
        return "Greg";
    }
};

var people = [person1, person2]; // Nikolas, Greg

alert(people);
alert(people.toString());        // Nicholas, Greg
alert(people.toLocaleString());  // Nikolas, Grigorios

</script>
</body>
</html>
