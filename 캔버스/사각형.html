<html>
    <head>
        <meta charset="utf-8">
    </head>
    <body>
        <canvas id = "myCanvas" width="600" height="400" style="border: 3px solid;">
        </canvas>
        <script type="text/javascript">
            var ctx = document.getElementById("myCanvas");
            var myContext = ctx.getContext("2d");

            myContext.strokeRect(10, 10, 200, 150);  // 속 빈 사각형
            myContext.fillRect(250, 10, 200, 150) // 속이 찬 사각형
            myContext.fillRect(10, 170, 200, 150);
            myContext.clearRect(270, 20, 100, 50);  // 사각의 영역을 지움
        </script>
    </body>
</html>
